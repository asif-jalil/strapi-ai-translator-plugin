name: Publish to npm

# Publishes to npm whenever you create a GitHub Release.
# Requires an npm token in the repo secret NPM_TOKEN (see README / setup notes).
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm run verify

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
